        - heading "How Manage Blocks and Clients Works" [level=2] [ref=e86]
        - paragraph [ref=e87]: A closer look at what's under the hood.
      - generic [ref=e88]:
        - generic [ref=e89]:
          - generic [ref=e90]: "01"
          - heading "Easy Block Setup" [level=3] [ref=e91]
          - paragraph [ref=e92]: Administrators set up new blocks by entering the block name, address, ARMS number, and any custom fields required for their portfolio. The setup process is designed for non-technical users — no IT support needed. Multiple blocks and buildings can be added within minutes, and your entire portfolio can be operational in Dominium within a single day.
        - generic [ref=e94]:
          - img [ref=e96]
          - paragraph [ref=e99]: Easy Block Setup
      - generic [ref=e100]:
        - generic [ref=e101]:
          - generic [ref=e102]: "02"
          - heading "Detailed Block Information" [level=3] [ref=e103]
          - paragraph [ref=e104]: Dominium maintains comprehensive records for every block — including ARMS numbers, maintenance schedules, insurance details, building rules, and contact information for block representatives. All records are centralised and immediately accessible to every authorised team member, eliminating the scattered spreadsheets and shared drives that slow most management teams down.
        - generic [ref=e106]:
          - img [ref=e108]
          - paragraph [ref=e111]: Detailed Block Information
      - generic [ref=e112]:
        - generic [ref=e113]:
          - generic [ref=e114]: "03"
          - heading "Easy Client Setup and Flexible Assignment" [level=3] [ref=e115]
          - paragraph [ref=e116]: Create new client profiles quickly by entering name, contact details, and assigned blocks. Clients can be assigned to one or multiple blocks to accurately reflect their involvement across your portfolio. Bulk import of existing resident records ensures that migrating from a previous system is fast and painless — with zero manual re-entry of client data.
        - generic [ref=e118]:
          - img [ref=e120]
          - paragraph [ref=e123]: Easy Client Setup and Flexible Assignment
      - generic [ref=e124]:
        - generic [ref=e125]:
          - generic [ref=e126]: "04"
          - heading "Bulk Export via CSV" [level=3] [ref=e127]
          - paragraph [ref=e128]: Use the CSV export feature to download complete block and client data simultaneously. Whether migrating data, preparing AGM reports, or auditing your portfolio, bulk export puts the information you need at your fingertips instantly. Every export is structured and clean — ready to open in Excel or import into another system without any additional formatting.
        - generic [ref=e130]:
          - img [ref=e132]
          - paragraph [ref=e133]: Bulk Export via CSV
