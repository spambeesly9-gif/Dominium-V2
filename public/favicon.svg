<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark navy background -->
  <rect width="64" height="64" rx="12" fill="#000428"/>

  <!-- Curved arrow: sweeps counterclockwise from upper-left around, arrowhead at bottom-left -->
  <path
    d="M 18 12 A 22 22 0 1 0 13 42"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
  />
  <!-- Arrowhead at bottom of arc -->
  <polyline
    points="7,38 13,44 20,39"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- House: peaked roof + body outline, shifted right-center -->
  <polyline
    points="23,36 23,50 43,50 43,36"
    fill="none"
    stroke="white"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polyline
    points="19,37 33,22 47,37"
    fill="none"
    stroke="white"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
